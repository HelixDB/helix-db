apiVersion: v1
kind: Service
metadata:
  name: helixdb-service
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: helixdb
  ports:
    - name: helixdb
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}

